name: CICD
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Run deployment scripts on Synology Nas
        uses: appleboy/ssh-action@master
        with:
            host: ${{ secrets.HOST_NAME }}
            port: ${{ secrets.SSH_PORT }}
            username: ${{ secrets.USER_NAME}}
            password: ${{ secrets.USER_PASSWORD }}
            script: |
              whoami
              cd /var/services/homes/solduma/my-page
              /opt/bin/git checkout main
              /opt/bin/git fetch --all
              /opt/bin/git reset --hard origin/main
              /usr/local/bin/pm2 kill
              cd frontend
              /usr/local/bin/npm install
              /usr/local/bin/npm run build
              /usr/local/bin/pm2 start /usr/local/bin/npm -- start
