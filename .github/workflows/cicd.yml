name: CICD
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Run deployment scripts on Synology Nas
        uses: appleboy/ssh-action@master
        with:
            host: ${{ secrets.HOST_NAME }}
            port: ${{ secrets.SSH_PORT }}
            username: ${{ secrets.USER_NAME}}
            password: ${{ secrets.USER_PASSWORD }}
            script: |
              whoami
              cd /volume1/homes/solduma
              source ./.bash_profile 
              cd /var/services/homes/solduma/my-page
              echo -n ${{ secrets.USER_PASSWORD }} | sudo -S git checkout main
              echo -n ${{ secrets.USER_PASSWORD }} | sudo -S git fetch --all
              echo -n ${{ secrets.USER_PASSWORD }} | sudo -S git reset --hard origin/main
              echo -n ${{ secrets.USER_PASSWORD }} | sudo -S pm2 kill
              cd frontend
              echo -n ${{ secrets.USER_PASSWORD }} | sudo -S npm install
              echo -n ${{ secrets.USER_PASSWORD }} | sudo -S npm run build
              echo -n ${{ secrets.USER_PASSWORD }} | sudo -S pm2 start npm -- start
